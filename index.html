<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Occidental Lofts / Groupe Centra — Rentals</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2eb; --surface: #faf8f4; --card: #ffffff;
    --border: #e2ddd4; --border-strong: #c8c2b6;
    --text: #1c1a16; --text-2: #6b6760; --text-3: #a09c96;
    --accent: #1c1a16; --accent-warm: #8b5e3c;
    --green: #2d5a3d; --green-bg: #eaf2ed;
    --font-display: 'Fraunces', serif;
    --font-body: 'Instrument Sans', sans-serif;
    --r: 14px; --r-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }
  html, body { height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

  nav {
    display: flex; align-items: center; border-bottom: 1px solid var(--border);
    background: var(--surface); padding: 0 20px; height: 54px; flex-shrink: 0;
  }
  .nav-brand { font-family: var(--font-display); font-size: 18px; font-weight: 300; font-style: italic; }
  .nav-status { margin-left: auto; font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .status-dot.ok { background: #2d5a3d; }
  .status-dot.err { background: #c0392b; }

  #app { display: flex; flex-direction: column; height: 100%; }
  #chat-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; max-width: 720px; margin: 0 auto; width: 100%; }

  #messages { flex: 1; overflow-y: auto; padding: 24px 20px 12px; display: flex; flex-direction: column; gap: 4px; }
  .msg-group { display: flex; flex-direction: column; margin-bottom: 16px; }
  .msg-group.user { align-items: flex-end; }
  .msg-group.bot { align-items: flex-start; }
  .msg-label { font-size: 11px; color: var(--text-3); margin-bottom: 5px; letter-spacing: .02em; }
  .bubble { max-width: 78%; padding: 12px 16px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg-group.user .bubble { background: var(--accent); color: white; border-radius: 18px 18px 4px 18px; }
  .msg-group.bot .bubble { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 18px 18px 18px 4px; box-shadow: var(--shadow); }
  .pill-green { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; margin-top: 8px; background: var(--green-bg); color: var(--green); }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); animation: bounce 1.1s ease-in-out infinite; display: inline-block; }
  .dot:nth-child(2) { animation-delay: .18s; }
  .dot:nth-child(3) { animation-delay: .36s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }

  #input-bar { padding: 12px 20px 16px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 10px; align-items: flex-end; }
  #msg-input {
    flex: 1; border: 1px solid var(--border-strong); border-radius: 22px;
    padding: 11px 18px; font-size: 15px; font-family: var(--font-body);
    background: var(--card); color: var(--text); resize: none; outline: none;
    line-height: 1.5; max-height: 130px; overflow-y: auto; transition: border-color .15s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input:disabled { opacity: 0.5; }
  #send-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: var(--accent); color: white; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s; flex-shrink: 0;
  }
  #send-btn:disabled { background: var(--border); color: var(--text-3); cursor: not-allowed; }
  #send-btn:not(:disabled):hover { transform: scale(1.06); }
  .privacy { text-align: center; font-size: 11px; color: var(--text-3); padding: 4px 20px 12px; }
</style>
</head>
<body>
<div id="app">
  <nav>
    <span class="nav-brand">Occidental / Groupe Centra</span>
    <span class="nav-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Loading listings…</span>
    </span>
  </nav>
  <div id="chat-panel">
    <div id="messages"></div>
    <div id="input-bar">
      <textarea id="msg-input" placeholder="Type a message… / Écrivez un message…" rows="1" disabled
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="autoResize(this)"></textarea>
      <button id="send-btn" disabled onclick="sendMsg()" aria-label="Send">↑</button>
    </div>
    <div class="privacy">🔒 Your information is kept confidential and used only for rental purposes.</div>
  </div>
</div>

<script>
let APARTMENTS = [];
let history = [], leadInfo = {name:null,phone:null,email:null}, matchedAptId = null, stage = 'qa', infoStep = null;

// ── Bootstrap: fetch listings then enable chat ────────────────────────────────
async function loadListings() {
  try {
    const res = await fetch('/functions/apartments');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    APARTMENTS = await res.json();
    if (!Array.isArray(APARTMENTS) || APARTMENTS.length === 0) throw new Error('No listings found in sheet.');

    setStatus('ok', `${APARTMENTS.length} listings loaded`);
    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    addBotMsg('👋 Hi! I\'m the rental assistant for Occidental Lofts & Groupe Centra.\n\nWe have apartments available across Montréal — Plateau, Downtown, NDG, Repentigny and more. Ask me anything about pricing, size, pets, availability — in English or French.\n\nBonjour ! Posez-moi vos questions sur nos appartements en anglais ou en français !');
  } catch (e) {
    setStatus('err', 'Could not load listings');
    addBotMsg(`⚠️ Could not load apartment listings: ${e.message}\n\nPlease check your Google Sheet setup.`);
  }
}

function setStatus(type, text) {
  document.getElementById('status-dot').className = `status-dot ${type}`;
  document.getElementById('status-text').textContent = text;
}

// ── System prompt ─────────────────────────────────────────────────────────────
function buildSystem() {
  const listings = APARTMENTS.map(a =>
    `[${a.id}] ${a.name}\n  Address: ${a.address}\n  Price: ${a.price} | Rooms: ${a.rooms}${a.size?' | Size: '+a.size:''}\n  Available: ${a.available} | Lease: ${a.lease}\n  Amenities: ${a.amenities.join(', ')}\n  Pets: ${a.pets} | Parking: ${a.parking}\n  About: ${a.description}${a.moveInBonus?' | Bonus: '+a.moveInBonus:''}`
  ).join('\n\n');
  return `You are a warm, professional bilingual rental assistant for Occidental Lofts / Groupe Centra in Montréal.
Always reply in the same language as the user (English or French). Be concise and friendly. Keep replies under 100 words unless more detail is needed. Never invent details.

LISTINGS:
${listings}

STAGE: ${stage} | LEAD: ${JSON.stringify(leadInfo)} | MATCHED APT: ${matchedAptId||'none'}

INSTRUCTIONS:
- Stage "qa": Answer questions freely. Help match the lead to the right apartment. When the lead clearly wants to visit, say so warmly then on its own line output exactly: QUALIFY:[aptId]
- Stage "qualify": System is collecting lead info. Stay warm.
- Stage "done": Confirm warmly that you are coordinating with the current tenant.
- Never reveal tenant phone numbers or full last names.
- Only output QUALIFY when the lead genuinely wants to visit.`;
}

// ── Chat logic ────────────────────────────────────────────────────────────────
async function sendMsg() {
  const el = document.getElementById('msg-input');
  const text = el.value.trim();
  if (!text || document.getElementById('send-btn').disabled) return;
  el.value = ''; autoResize(el);
  addUserMsg(text);
  history.push({role:'user', content:text});
  if (stage === 'qualify' && infoStep) { collectInfo(text); return; }
  setLoading(true);
  try {
    const res = await fetch('/functions/claude', {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6-20250217',
        max_tokens: 450,
        system: buildSystem(),
        messages: history
      })
    });
    const rawText = await res.text();
    let data;
    try { data = JSON.parse(rawText); }
    catch(e) { throw new Error('Function not found — check Netlify deploy logs. Raw: ' + rawText.slice(0,120)); }
    if (data.error) throw new Error(data.error.message);
    const full = data.content.map(b => b.text||'').join('');
    history.push({role:'assistant', content:full});
    handleResponse(full);
  } catch(e) {
    addBotMsg('⚠️ Error: ' + e.message);
  } finally { setLoading(false); }
}

function handleResponse(full) {
  const m = full.match(/QUALIFY:([a-z0-9-]+)/i);
  const display = full.replace(/QUALIFY:[a-z0-9-]+/gi,'').trim();
  if (m) {
    matchedAptId = m[1]; stage = 'qualify'; infoStep = 'name';
    if (display) addBotMsg(display);
    setTimeout(() => {
      const q = "What's your full legal name?";
      addBotMsg(q); history.push({role:'assistant', content:q});
    }, display ? 500 : 0);
    return;
  }
  addBotMsg(display);
}

function collectInfo(text) {
  const t = text.trim();
  if (infoStep === 'name') {
    leadInfo.name = t; infoStep = 'phone';
    const r = `Got it, ${t.split(' ')[0]}! 📱 What's your phone number?`;
    addBotMsg(r); history.push({role:'assistant', content:r});
  } else if (infoStep === 'phone') {
    leadInfo.phone = t; infoStep = 'email';
    const r = 'And your email address?';
    addBotMsg(r); history.push({role:'assistant', content:r});
  } else if (infoStep === 'email') {
    leadInfo.email = t; infoStep = null; stage = 'done';
    const apt = APARTMENTS.find(a => a.id === matchedAptId);
    const r = `✅ Perfect, ${leadInfo.name.split(' ')[0]}! You're all set.\n\nI'm now coordinating a visit with the current tenant of ${apt?.name||'the apartment'}.\n\nYou'll hear back shortly — usually within a few hours. We're excited to show you the place! 🏠`;
    addBotMsg(r, 'pill-green');
    history.push({role:'assistant', content:r});
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function addUserMsg(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg-group user';
  d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function addBotMsg(text, pillClass) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg-group bot';
  let html = `<div class="msg-label">Assistant</div><div class="bubble">${esc(text)}</div>`;
  if (pillClass) html += `<span class="${pillClass}">✅ Coordinating your visit</span>`;
  d.innerHTML = html;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

let loadingEl = null;
function setLoading(on) {
  document.getElementById('send-btn').disabled = on;
  const msgs = document.getElementById('messages');
  if (on) {
    loadingEl = document.createElement('div');
    loadingEl.className = 'msg-group bot';
    loadingEl.innerHTML = `<div class="msg-label">Assistant</div><div class="bubble" style="padding:14px 18px"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    msgs.appendChild(loadingEl); msgs.scrollTop = msgs.scrollHeight;
  } else if (loadingEl) { loadingEl.remove(); loadingEl = null; }
}

function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }
function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

window.onload = () => loadListings();
</script>

</body></html>
